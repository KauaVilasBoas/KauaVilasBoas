name: Generate Snake Animation

on:
  # Roda a cada 12 horas pra manter a snake atualizada
  schedule:
    - cron: "0 */12 * * *"
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:
  # Roda sempre que algo for empurrado pra main
  push:
    branches:
      - main
      
permissions: 
  contents: write 

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Gera os SVGs (versão clara e escura)
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Publica os SVGs na branch `output`
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
